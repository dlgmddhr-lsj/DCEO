<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockBoard v2.0 - 최신 주식 현황판</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stock-up { color: #f87171; }
        .stock-down { color: #60a5fa; }
        .tab-active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        /* Custom Tooltip Shadow */
        .recharts-default-tooltip {
            border: none !important;
            border-radius: 12px !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

        // 종목별 초기 데이터
        const STOCKS = {
            '005930': { name: '삼성전자', price: 84500, change: 1.2, data: [
                { time: '09:00', price: 83500 }, { time: '10:00', price: 84000 }, 
                { time: '11:00', price: 83800 }, { time: '13:00', price: 84200 }, 
                { time: '15:00', price: 84500 }
            ]},
            '000660': { name: 'SK하이닉스', price: 182000, change: 2.5, data: [
                { time: '09:00', price: 178000 }, { time: '10:00', price: 180000 }, 
                { time: '11:00', price: 181000 }, { time: '13:00', price: 179500 }, 
                { time: '15:00', price: 182000 }
            ]},
            '035420': { name: 'NAVER', price: 195000, change: -0.8, data: [
                { time: '09:00', price: 197000 }, { time: '10:00', price: 196000 }, 
                { time: '11:00', price: 195500 }, { time: '13:00', price: 194000 }, 
                { time: '15:00', price: 195000 }
            ]}
        };

        const DashboardV2 = () => {
            const [selectedCode, setSelectedCode] = useState('005930');
            const [stockInfo, setStockInfo] = useState(STOCKS['005930']);
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());

            // 실시간 가격 시뮬레이션
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date().toLocaleTimeString());
                    
                    setStockInfo(prev => {
                        const jitter = (Math.random() - 0.5) * 200;
                        const newPrice = Math.round(prev.price + jitter);
                        const newData = [...prev.data.slice(1), { 
                            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }), 
                            price: newPrice 
                        }];
                        return { ...prev, price: newPrice, data: newData };
                    });
                }, 3000);
                return () => clearInterval(timer);
            }, [selectedCode]);

            // 종목 변경 처리
            const handleStockChange = (code) => {
                setSelectedCode(code);
                setStockInfo(STOCKS[code]);
            };

            return (
                <div className="flex h-screen bg-[#020617] text-slate-300 overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-72 bg-[#0f172a]/50 border-r border-slate-800 flex flex-col p-6 glass-panel">
                        <div className="flex items-center gap-3 mb-12">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                                <span className="font-black text-white text-xl">S</span>
                            </div>
                            <h1 className="text-2xl font-extrabold text-white tracking-tighter">StockBoard <span className="text-blue-500 text-xs">v2.0</span></h1>
                        </div>

                        <nav className="space-y-6 flex-1">
                            <div>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Market Watch</p>
                                <div className="space-y-2">
                                    {Object.keys(STOCKS).map(code => (
                                        <button 
                                            key={code}
                                            onClick={() => handleStockChange(code)}
                                            className={`w-full flex justify-between items-center p-4 rounded-2xl transition-all ${selectedCode === code ? 'bg-blue-600/20 border border-blue-500/50 text-white' : 'hover:bg-slate-800/50 border border-transparent'}`}
                                        >
                                            <div className="text-left">
                                                <p className="font-bold text-sm">{STOCKS[code].name}</p>
                                                <p className="text-[10px] text-slate-500">{code}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className={`text-xs font-bold ${STOCKS[code].change > 0 ? 'text-red-400' : 'text-blue-400'}`}>
                                                    {STOCKS[code].change}%
                                                </p>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Menu</p>
                                <div className="space-y-1">
                                    <button className="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 text-sm font-medium transition-colors">📊 대시보드</button>
                                    <button className="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 text-sm font-medium transition-colors">🌍 해외 증시</button>
                                    <button className="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 text-sm font-medium transition-colors">📰 뉴스 피드</button>
                                </div>
                            </div>
                        </nav>
                        
                        <div className="pt-6 border-t border-slate-800">
                            <div className="bg-slate-800/50 p-4 rounded-2xl">
                                <p className="text-[10px] text-slate-500 mb-1">Last Update</p>
                                <p className="text-xs font-mono text-white">{currentTime}</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto p-10 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900/10 via-transparent to-transparent">
                        {/* Header */}
                        <div className="flex justify-between items-center mb-10">
                            <div className="flex items-center gap-10">
                                <div>
                                    <h2 className="text-4xl font-black text-white mb-2 flex items-center gap-4">
                                        {stockInfo.name}
                                        <span className="text-sm font-normal text-slate-500 bg-slate-800 px-3 py-1 rounded-full uppercase">{selectedCode}</span>
                                    </h2>
                                    <div className="flex items-center gap-4">
                                        <span className="text-5xl font-extrabold tracking-tighter text-white tabular-nums">
                                            {stockInfo.price.toLocaleString()}
                                        </span>
                                        <div className={`flex flex-col font-bold ${stockInfo.change > 0 ? 'text-red-500' : 'text-blue-500'}`}>
                                            <span className="text-lg">▲ {stockInfo.change}%</span>
                                            <span className="text-xs">+1,200 KRW</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex gap-4">
                                <div className="glass-panel p-5 rounded-3xl text-right min-w-[140px]">
                                    <p className="text-[10px] font-bold text-slate-500 mb-1 uppercase">KOSPI</p>
                                    <p className="text-xl font-black text-white">2,650.21</p>
                                    <p className="text-xs font-bold text-red-500">+0.84%</p>
                                </div>
                                <div className="glass-panel p-5 rounded-3xl text-right min-w-[140px]">
                                    <p className="text-[10px] font-bold text-slate-500 mb-1 uppercase">NASDAQ</p>
                                    <p className="text-xl font-black text-white">16,274.94</p>
                                    <p className="text-xs font-bold text-blue-500">-1.12%</p>
                                </div>
                            </div>
                        </div>

                        {/* Chart Area */}
                        <section className="glass-panel rounded-[40px] p-10 mb-10 shadow-2xl relative overflow-hidden group">
                            <div className="flex justify-between items-center mb-10 relative z-10">
                                <div className="flex gap-2 bg-slate-900/50 p-1.5 rounded-2xl border border-slate-700/50">
                                    {['1분', '5분', '1시간', '1일', '1개월'].map(t => (
                                        <button key={t} className={`px-6 py-2 rounded-xl text-xs font-bold transition-all ${t === '1분' ? 'tab-active' : 'text-slate-500 hover:text-white'}`}>
                                            {t}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button className="p-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">🔍</button>
                                    <button className="p-3 bg-slate-800 rounded-xl hover:bg-slate-700 transition-colors">⚙️</button>
                                </div>
                            </div>

                            <div className="h-[450px] w-full relative z-10">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={stockInfo.data}>
                                        <defs>
                                            <linearGradient id="colorPrice" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#2563eb" stopOpacity={0.6}/>
                                                <stop offset="95%" stopColor="#2563eb" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" vertical={false} />
                                        <XAxis dataKey="time" stroke="#475569" axisLine={false} tickLine={false} tick={{fontSize: 11, fontWeight: 600}} dy={15} />
                                        <YAxis stroke="#475569" axisLine={false} tickLine={false} tick={{fontSize: 11, fontWeight: 600}} domain={['auto', 'auto']} tickFormatter={(val) => val.toLocaleString()} />
                                        <Tooltip 
                                            contentStyle={{backgroundColor: '#1e293b', border: 'none', borderRadius: '16px', padding: '12px'}}
                                            itemStyle={{color: '#60a5fa', fontWeight: 'bold'}}
                                            labelStyle={{color: '#94a3b8', fontSize: '10px', marginBottom: '4px'}}
                                        />
                                        <Area 
                                            type="monotone" 
                                            dataKey="price" 
                                            stroke="#3b82f6" 
                                            strokeWidth={4} 
                                            fillOpacity={1} 
                                            fill="url(#colorPrice)"
                                            animationDuration={1000}
                                        />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </section>

                        {/* Info Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Financials */}
                            <div className="lg:col-span-2 glass-panel rounded-[32px] p-8">
                                <h3 className="text-xl font-black text-white mb-6">주요 재무 지표</h3>
                                <div className="grid grid-cols-3 gap-6">
                                    <StatCard label="매출액" value="258.9조" sub="전년비 -12%" />
                                    <StatCard label="영업이익" value="6.5조" sub="전년비 -84%" />
                                    <StatCard label="당기순이익" value="12.1조" sub="전년비 -78%" />
                                    <StatCard label="PER" value="35.21" sub="동일업종 12.4" />
                                    <StatCard label="PBR" value="1.42" sub="안정권" />
                                    <StatCard label="배당수익률" value="2.14%" sub="분기배당" />
                                </div>
                            </div>
                            
                            {/* News */}
                            <div className="glass-panel rounded-[32px] p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-white">최신 뉴스</h3>
                                    <button className="text-xs text-blue-500 font-bold">전체보기</button>
                                </div>
                                <div className="space-y-6">
                                    <NewsCard title="삼성전자, HBM3E 12단 테스트 통과 소식에 급등" time="15분 전" />
                                    <NewsCard title="외국인 투자자 10거래일 연속 순매수 지속" time="1시간 전" />
                                    <NewsCard title="반도체 업황 회복 본격화... 목표가 상향 속출" time="3시간 전" />
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const StatCard = ({ label, value, sub }) => (
            <div className="bg-slate-900/40 p-6 rounded-3xl border border-slate-800/50 hover:border-blue-500/30 transition-colors group">
                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 group-hover:text-blue-400 transition-colors">{label}</p>
                <p className="text-2xl font-black text-white mb-1 tracking-tighter">{value}</p>
                <p className="text-[10px] text-slate-400">{sub}</p>
            </div>
        );

        const NewsCard = ({ title, time }) => (
            <div className="group cursor-pointer">
                <p className="text-sm font-bold text-slate-200 group-hover:text-blue-400 transition-all leading-snug line-clamp-2 mb-2">{title}</p>
                <p className="text-[10px] text-slate-500 font-medium">{time} • 주요경제뉴스</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardV2 />);
    </script>
</body>
</html>
